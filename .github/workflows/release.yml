name: Release

# Build the polygit binary for each supported target on a version tag and attach them to the
# GitHub Release, so the install script (and `releases/latest/download/...`) can fetch them.
# Targets cover Linux, macOS, and Windows (native x86_64-pc-windows-msvc — no WSL needed).

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Create the release once, up front. If the matrix jobs each created it, they'd race and one
  # would fail with "tag_name already_exists", dropping that target's binary from the release.
  create-release:
    name: Create release
    runs-on: ubuntu-22.04
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v3

  build:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Build linux on 22.04 (GLIBC 2.35) so the binaries run on current distros, not just
          # the runner's newest GLIBC. macOS x86_64 cross-compiles from the arm runner (macos-13
          # Intel runners are scarce and queue for ages).
          - { os: ubuntu-22.04,     target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-22.04-arm, target: aarch64-unknown-linux-gnu }
          - { os: macos-14,         target: x86_64-apple-darwin }
          - { os: macos-14,         target: aarch64-apple-darwin }
          - { os: windows-latest,   target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v6

      - name: Add Rust target
        run: rustup update stable && rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          bin="target/${{ matrix.target }}/release/polygit"
          cp "$bin" "polygit-${{ matrix.target }}"
          tar -czf "polygit-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" polygit

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/polygit.exe"
          Copy-Item $bin "polygit-${{ matrix.target }}.exe"
          Compress-Archive -Path $bin -DestinationPath "polygit-${{ matrix.target }}.zip"

      # The release already exists (create-release), so this only uploads assets — no create race.
      - name: Attach to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            polygit-${{ matrix.target }}*
